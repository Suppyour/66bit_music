version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: music_loto_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: misha
      POSTGRES_DB: MusicLotoDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music_loto_api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # Включаем Swagger
      - ASPNETCORE_ENVIRONMENT=Development
      # Указываем порт
      - ASPNETCORE_HTTP_PORTS=8080
      # МАГИЯ DOCKER: Меняем Host=localhost на Host=db (имя контейнера из сервиса выше)
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=MusicLotoDb;Username=postgres;Password=misha
    volumes:
      - app_wwwroot:/app/wwwroot
    restart: unless-stopped

volumes:
  postgres_data:
  app_wwwroot:
